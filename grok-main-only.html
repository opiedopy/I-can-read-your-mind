<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Can Read Your Mind</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --deep: #0a0014;
    --void: #06000d;
    --purple: #6b21d6;
    --violet: #9b4dff;
    --electric: #c084fc;
    --gold: #fbbf24;
    --gold-dim: #d97706;
    --teal: #2dd4bf;
    --crimson: #f43f5e;
    --text: #e8d5ff;
    --muted: #9f7ec9;
    --surface: rgba(107,33,214,0.12);
    --border: rgba(155,77,255,0.3);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Crimson Pro', Georgia, serif;
    background: var(--void);
    color: var(--text);
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 40% 70%, rgba(192,132,252,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 65% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 80%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 90% 60%, rgba(251,191,36,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 50%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 15%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(2px 2px at 75% 85%, rgba(192,132,252,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 35%, rgba(255,255,255,0.4) 0%, transparent 100%);
    pointer-events: none; z-index: 0;
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(107,33,214,0.25) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 80% 80%, rgba(155,77,255,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 60% 40%, rgba(45,212,191,0.06) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }
  #app { position: relative; z-index: 1; }
  /* ===== VIEWS ===== */
  .view { display: none; }
  .view.active { display: flex; flex-direction: column; }
  /* Main: fixed viewport height, NO scrolling */
  #view-main {
    height: 100vh;
    overflow: hidden;
  }
  /* Learn: scrolls normally */
  #view-learn {
    min-height: 100vh;
    overflow-y: auto;
  }
  /* ===== HEADER ===== */
  header {
    text-align: center;
    padding: 1.4rem 1rem 0.4rem;
    flex-shrink: 0;
  }
  .eye-container {
    width: 54px; height: 54px;
    margin: 0 auto 0.6rem;
    position: relative;
    animation: float 4s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
